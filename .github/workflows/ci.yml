name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on hooks
        run: shellcheck --severity=warning hooks/*.sh
      - name: Run ShellCheck on tests
        run: shellcheck --severity=warning tests/*.sh

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run test suite
        run: bash tests/run-all.sh

  test-level1:
    name: Level 1 Tests (Integration)
    runs-on: ubuntu-latest
    needs: [shellcheck, test]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.ENABLE_LEVEL1_TESTS == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Run Level 1 tests
        env:
          RUN_LEVEL1_TESTS: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash tests/run-all.sh
