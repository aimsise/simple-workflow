name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Add swap headroom (shellcheck peaks ~15-24 GB on one test file; 16 GB RAM alone OOM-kills the agent -> "operation was canceled")
        run: |
          # tests/test-skill-contracts.sh (~11.7k lines) drives shellcheck's core
          # dataflow analysis to a ~14-24 GB peak by itself (measured); the 16 GB
          # ubuntu-latest runner OOM-kills the agent intermittently. A dedicated
          # 16 GB swapfile lets the kernel page the cold GHC GC copy-space instead
          # of starving the agent, so the analysis completes (lint surface unchanged).
          # Durable follow-up: split test-skill-contracts.sh so no single file
          # exceeds runner RAM (worst half measured ~6 GB).
          sudo fallocate -l 16G /mnt/swapfile-ci || sudo dd if=/dev/zero of=/mnt/swapfile-ci bs=1M count=16384
          sudo chmod 600 /mnt/swapfile-ci
          sudo mkswap /mnt/swapfile-ci
          sudo swapon /mnt/swapfile-ci
          swapon --show
          free -h
      - name: Run ShellCheck on hooks
        run: shellcheck --severity=warning hooks/*.sh hooks/lib/*.sh
      - name: Run ShellCheck on tests
        run: shellcheck --severity=warning tests/*.sh tests/helpers/*.sh

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Install tiktoken (exercises count-tokens.sh tiktoken branch in CI)
        run: python3 -m pip install --user tiktoken
      - name: Run test suite
        run: bash tests/run-all.sh

  # Level 1 integration tests (claude -p) are intentionally excluded from CI
  # to avoid Anthropic API charges. Run locally when needed:
  #   bash tests/test-integration.sh
