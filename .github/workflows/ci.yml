name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on hooks
        run: shellcheck --severity=warning hooks/*.sh
      - name: Run ShellCheck on tests
        run: shellcheck --severity=warning tests/*.sh tests/helpers/*.sh

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Install tiktoken (exercises count-tokens.sh tiktoken branch in CI)
        run: python3 -m pip install --user tiktoken
      - name: Run test suite
        run: bash tests/run-all.sh

  # Level 1 integration tests (claude -p) are intentionally excluded from CI
  # to avoid Anthropic API charges. Run locally when needed:
  #   bash tests/test-integration.sh
