name: Bug Report
description: Report a bug with a skill, agent, or hook
title: "[Bug]: "
labels: ["bug", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the plugin is affected?
      options:
        - Skill (slash command)
        - Agent
        - Hook (safety/session)
        - Other
    validations:
      required: true
  - type: input
    id: component-name
    attributes:
      label: Component Name
      description: "Name of the affected skill, agent, or hook (e.g., /impl, ac-evaluator, pre-bash-safety.sh)"
      placeholder: "/scout"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Steps to reproduce the behavior. Include the slash command used and any arguments.
      placeholder: |
        1. Run `/scout <topic>`
        2. See error...
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: "Run `claude --version` to get this"
      placeholder: "1.x.x"
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: false
